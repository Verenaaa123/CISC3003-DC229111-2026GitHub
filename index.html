<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC229111 Li Wuyue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="container" id="container" aria-label="Signup and login form">
            <div class="form-container sign-up-container">
                <form action="#" method="post">
                    <h1>Join Us</h1>
                    <div class="social-container">
                        <a href="#" class="social" aria-label="Sign up with Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="social" aria-label="Sign up with Google"><i class="fa-brands fa-google-plus-g"></i></a>
                        <a href="#" class="social" aria-label="Sign up with LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                    <span>Use your email to sign up</span>
                    <input type="text" name="full-name" placeholder="Full Name" autocomplete="name" required>
                    <input type="email" name="signup-email" placeholder="Email" autocomplete="email" required>
                    <input type="password" name="signup-password" placeholder="Create Password" autocomplete="new-password" required>
                    <button type="submit">Register</button>
                </form>
            </div>

            <div class="form-container sign-in-container">
                <form action="#" method="post">
                    <h1>Log In</h1>
                    <div class="social-container">
                        <a href="#" class="social" aria-label="Sign in with Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                        <a href="#" class="social" aria-label="Sign in with Google"><i class="fa-brands fa-google-plus-g"></i></a>
                        <a href="#" class="social" aria-label="Sign in with LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                    </div>
                    <span>Use your account to sign in</span>
                    <input type="email" name="signin-email" placeholder="Email" autocomplete="email" required>
                    <input type="password" name="signin-password" placeholder="Password" autocomplete="current-password" required>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                    <button type="submit">Sign In</button>
                </form>
            </div>

            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1>Hello , Again!</h1>
                        <img src="images/website_7376495.png" alt="Profile card illustration" class="panel-image">
                        <p>Log in to stay connected with us</p>
                        <button class="ghost" id="signIn" type="button">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1>Welcome!</h1>
                        <img src="images/unsecure_10399884.png" alt="Unlocked envelope illustration" class="panel-image">
                        <p>Enter your details to start your journey</p>
                        <button class="ghost" id="signUp" type="button">Sign Up</button>
                    </div>
                </div>
            </div>
        </section>
        <footer>CISC3003 Web Programming: DC229111 Li Wuyue 2026</footer>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
